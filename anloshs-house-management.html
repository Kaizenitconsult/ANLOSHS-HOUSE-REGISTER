  }
  .select-screen .loading-note{color:#D6DBD3;}
  .select-header{text-align:center;margin-bottom:8px;}
  .select-header .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#B9C2B8;margin-bottom:10px;}
  .select-header h1{font-size:42px;margin:0 0 6px;font-weight:600;color:#FFFFFF;text-shadow:0 2px 18px rgba(0,0,0,.25);}
  .select-header p{color:#D6DBD3;margin:0 0 40px;font-size:15px;}
  .house-grid{display:grid;grid-template-columns:repeat(4,minmax(180px,220px));gap:20px;}
  @media(max-width:900px){.house-grid{grid-template-columns:repeat(2,minmax(150px,220px));}}
  .house-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:4px;padding:26px 18px 22px;text-align:center;transition:transform .15s ease, box-shadow .15s ease;position:relative;overflow:hidden;box-shadow:0 14px 34px rgba(6,14,10,.35);}
  .house-card:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(6,14,10,.42);cursor:pointer;}
  .house-card:before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--card-color);}
  .crest{width:58px;height:66px;margin:6px auto 16px;clip-path:polygon(50% 0%,100% 16%,100% 58%,50% 100%,0% 58%,0% 16%);background:var(--card-color);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces',serif;font-size:22px;font-weight:600;}
  .house-card h3{margin:0 0 4px;font-size:17px;}
  .house-card .tag{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink-soft);}
  .footer-credit{margin-top:52px;font-size:11px;color:#9CA79E;letter-spacing:.03em;font-family:'IBM Plex Mono',monospace;text-align:center;}

  /* ---------- Workspace layout ---------- */
  .workspace{display:flex;min-height:100vh;}
  .sidebar{width:230px;flex-shrink:0;background:var(--ink);color:#EFEBDD;display:flex;flex-direction:column;padding:22px 16px;}
  .sidebar .brand{display:flex;align-items:center;gap:10px;margin-bottom:26px;padding:0 4px;}
  .sidebar .crest-sm{width:34px;height:39px;clip-path:polygon(50% 0%,100% 16%,100% 58%,50% 100%,0% 58%,0% 16%);background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces',serif;font-size:15px;font-weight:600;flex-shrink:0;}
  .sidebar .brand-text .h{font-family:'Fraunces',serif;font-size:15px;line-height:1.2;font-weight:600;}
  .sidebar .brand-text .s{font-size:10px;color:#9CA79E;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:4px;font-size:13.5px;color:#D6DBD3;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;transition:background .12s;}
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-item .badge{margin-left:auto;background:var(--red-flag);color:#fff;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:1px 6px;border-radius:20px;}
  .sidebar-spacer{flex:1;}
  .switch-house-btn{background:transparent;border:1px solid rgba(255,255,255,.18);color:#B9C2B8;font-size:12px;padding:9px 10px;border-radius:4px;width:100%;text-align:left;}
  .switch-house-btn:hover{border-color:rgba(255,255,255,.4);}
  .sidebar-credit{font-size:9.5px;color:#5D6960;font-family:'IBM Plex Mono',monospace;margin-top:14px;letter-spacing:.03em;line-height:1.5;}

  .main{flex:1;padding:30px 40px 60px;max-width:1180px;}
  .page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px;flex-wrap:wrap;gap:14px;}
  .page-header h1{font-size:27px;margin:0 0 4px;font-weight:600;}
  .page-header .sub{color:var(--ink-soft);font-size:13.5px;}
  .btn{border:none;border-radius:4px;padding:10px 16px;font-size:13.5px;font-weight:600;background:var(--accent);color:#fff;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{background:var(--accent-dark);}
  .btn.secondary{background:var(--paper-raised);color:var(--ink);border:1px solid var(--line-strong);}
  .btn.secondary:hover{background:var(--white);}
  .btn.danger{background:var(--red-flag);}
  .btn.danger:hover{background:#7f2530;}
  .btn.small{padding:6px 11px;font-size:12px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* dashboard */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  @media(max-width:900px){.stat-row{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:5px;padding:16px 18px;}
  .stat-card .num{font-family:'Fraunces',serif;font-size:30px;font-weight:600;line-height:1;margin-bottom:6px;}
  .stat-card .label{font-size:12px;color:var(--ink-soft);letter-spacing:.02em;}
  .stat-card.flag .num{color:var(--red-flag);}

  .alert-banner{background:var(--red-flag-tint);border:1px solid #DEB6BA;border-left:4px solid var(--red-flag);border-radius:5px;padding:16px 20px;margin-bottom:24px;}
  .alert-banner h3{margin:0 0 10px;font-size:14.5px;color:var(--red-flag);display:flex;align-items:center;gap:8px;}
  .flag-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid #E7C6C9;font-size:13.5px;}
  .flag-row:first-of-type{border-top:none;}
  .flag-row .thumb{width:30px;height:30px;border-radius:50%;object-fit:cover;background:#ddd;flex-shrink:0;}
  .flag-row .name{font-weight:600;flex:1;}
  .flag-row .days{font-family:'IBM Plex Mono',monospace;font-size:11.5px;background:var(--red-flag);color:#fff;padding:2px 8px;border-radius:20px;}

  .panel{background:var(--paper-raised);border:1px solid var(--line);border-radius:5px;padding:20px 22px;margin-bottom:20px;}
  .panel h3{margin:0 0 14px;font-size:15px;}
  .empty-state{text-align:center;padding:34px 10px;color:var(--ink-soft);font-size:13.5px;}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--line-strong);padding:8px 10px;}
  td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tr.flagged{background:var(--red-flag-tint);}
  .photo-thumb{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#DDD6C2;display:inline-block;vertical-align:middle;}
  .photo-thumb.placeholder{display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:13px;color:var(--ink-soft);}
  .badge{font-family:'IBM Plex Mono',monospace;font-size:10.5px;padding:3px 9px;border-radius:20px;display:inline-block;letter-spacing:.02em;}
  .badge.out{background:#E4EFE7;color:var(--accent-dark);}
  .badge.overdue{background:var(--red-flag);color:#fff;}
  .badge.due{background:var(--sorkpor-tint);color:#7A5A0B;}
  .badge.returned{background:#E8E6DD;color:var(--ink-soft);}
  .badge.late{background:var(--sorkpor-tint);color:#7A5A0B;}
  .row-actions{display:flex;gap:6px;}
  .icon-btn{background:transparent;border:1px solid var(--line-strong);border-radius:4px;padding:5px 9px;font-size:12px;color:var(--ink-soft);}
  .call-btn{background:var(--red-flag);border-color:var(--red-flag);color:#fff;font-weight:600;white-space:nowrap;}
  .call-btn:hover{background:#7f2530;}
  .icon-btn:hover{background:var(--paper);color:var(--ink);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
  .search-input{padding:9px 12px;border:1px solid var(--line-strong);border-radius:4px;background:var(--white);font-size:13px;min-width:220px;}
  .search-input:focus{outline:2px solid var(--accent);outline-offset:1px;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(22,34,29,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal{background:var(--white);border-radius:6px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;padding:26px 26px 22px;}
  .modal h2{margin:0 0 18px;font-size:19px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--ink-soft);}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:4px;font-size:13.5px;background:var(--paper);}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--accent);outline-offset:1px;background:var(--white);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .photo-upload{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .photo-preview{width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--paper);border:1px solid var(--line-strong);}
  .file-btn{font-size:12px;}
  .close-x{position:absolute;top:14px;right:16px;background:transparent;border:none;font-size:20px;color:var(--ink-soft);}

  /* attendance grid */
  .att-table th.day{text-align:center;}
  .att-table td.day{text-align:center;}
  .att-check{width:19px;height:19px;accent-color:var(--accent);cursor:pointer;}
  .week-nav{display:flex;align-items:center;gap:10px;}
  .week-nav .lbl{font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:8px 14px;background:var(--paper);border:1px solid var(--line-strong);border-radius:4px;}
  .pct-pill{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:2px 7px;border-radius:20px;background:var(--accent-tint);color:var(--accent-dark);}

  .team-block{display:flex;align-items:flex-start;gap:16px;margin-bottom:6px;}
  .staff-list-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line);}
  .staff-list-item:first-child{border-top:none;}

/* =================== HELPERS =================== */
function uuid(){ return 'id-' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function todayISO(){ const d=new Date(); d.setHours(0,0,0,0); return isoDate(d); }
function isoDate(d){ return d.toISOString().slice(0,10); }
function parseISO(s){ const d = new Date(s+'T00:00:00'); return d; }
function mostRecentMonday(d){ const date=new Date(d); const day=date.getDay(); const diff=(day===0?-6:1-day); date.setDate(date.getDate()+diff); date.setHours(0,0,0,0); return date; }
function fmtDateShort(d){ return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); }
function fmtDateFull(s){ if(!s) return '—'; return parseISO(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }
function getHouse(id){ return HOUSES.find(h=>h.id===id); }
function initials(name){ if(!name) return '?'; return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }

function computeExeatStatus(ex){
  if(ex.actualReturn){
    return (ex.actualReturn > ex.expectedReturn) ? {status:'late'} : {status:'returned'};
  }
  const today = todayISO();
  if(today > ex.expectedReturn){
    return {status:'overdue', daysOverdue: daysBetween(parseISO(ex.expectedReturn), parseISO(today))};
  } else if(today === ex.expectedReturn){
    return {status:'due'};
  }
  return {status:'out', daysLeft: daysBetween(parseISO(today), parseISO(ex.expectedReturn))};
}

function flaggedExeats(){
  return state.exeats.map(e=>({...e, _status:computeExeatStatus(e)})).filter(e=>e._status.status==='overdue')
    .sort((a,b)=>b._status.daysOverdue - a._status.daysOverdue);
}

function setRootStyleForHouse(houseId){
  const h = getHouse(houseId);
  const root = document.documentElement;

function showToast(msg){

/* Lightweight PIN hashing — enough to stop casual snooping in shared storage,
   not intended as bank-grade security. Salted with the house id. */
function hashPin(pin, salt){
  const str = salt + '::' + pin;
  let hash = 5381;
  for(let i=0;i<str.length;i++){ hash = ((hash*33) ^ str.charCodeAt(i)) >>> 0; }
  for(let r=0;r<500;r++){ hash = ((hash*33 + r) ^ (hash>>>7)) >>> 0; }
  return 'h' + hash.toString(36);
}
function isValidPin(pin){ return /^[0-9]{4,6}$/.test(pin); }
function telHref(contact){ return 'tel:' + String(contact).replace(/[^0-9+]/g,''); }
function callButtonHtml(contact, label){
  label = label || 'Call';
  if(!contact) return `<span style="font-size:11px;color:var(--ink-soft);font-style:italic;">No contact on file</span>`;
  return `<a class="icon-btn call-btn" href="${telHref(contact)}" style="text-decoration:none;display:inline-flex;align-items:center;gap:5px;">📞 ${label}</a>`;
}

function resizeImageFile(file, maxDim, quality, cb){
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      let w = img.width, h = img.height;
      if(w>h){ if(w>maxDim){ h = Math.round(h*maxDim/w); w=maxDim; } }
      else { if(h>maxDim){ w = Math.round(w*maxDim/h); h=maxDim; } }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function loadHouseData(houseId){
  state.loading = true; render();
  try{
    const [studentsRes, infoRes, exeatsRes] = await Promise.all([
      safeGet('students:'+houseId),
      safeGet('house-info:'+houseId),
      safeGet('exeats:'+houseId),
    ]);
    state.students = studentsRes ? JSON.parse(studentsRes.value) : [];
    state.houseInfo = infoRes ? JSON.parse(infoRes.value) : {housemaster:null, staff:[]};
    state.exeats = exeatsRes ? JSON.parse(exeatsRes.value) : [];
  }catch(err){ console.error('Load error', err); showToast('Could not load some data.'); }
  await loadAttendanceForWeek();
  state.loading = false;
  render();
}
async function safeGet(key){
  if(!firebaseReady) return null;
  try{
    const doc = await db.collection(FIRESTORE_COLLECTION).doc(key).get();
    if(!doc.exists) return null;
    return { key, value: doc.data().value, shared: true };
  }catch(e){ console.error('Firestore get error', key, e); return null; }
}
async function loadAttendanceForWeek(){
  const key = 'attendance:'+state.houseId+':'+isoDate(state.weekStart);
  try{
    const res = await safeGet(key);
    state.attendance = res ? JSON.parse(res.value) : {};
  }catch(e){ state.attendance = {}; }
}
async function persist(keyName, value){
  if(!firebaseReady){
    showToast('Not connected to the database — check firebaseConfig at the top of the file.');
    return false;
  }
  const json = JSON.stringify(value);
  const byteSize = new Blob([json]).size;
  if(byteSize > FIRESTORE_SIZE_LIMIT){
    showToast('This record is too large to save (likely too many student photos in one house). Remove or replace a few photos and try again.');
    return false;
  }
  try{
    await db.collection(FIRESTORE_COLLECTION).doc(keyName).set({
      value: json,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    return true;
  }catch(e){
    console.error('Firestore set error', keyName, e);
    showToast('Save failed — check your internet connection and try again.');
    return false;
  }
}
async function saveStudents(){ await persist('students:'+state.houseId, state.students); }
async function saveHouseInfo(){ await persist('house-info:'+state.houseId, state.houseInfo); }
async function saveExeats(){ await persist('exeats:'+state.houseId, state.exeats); }
async function saveAttendance(){
  const weekSuffix = isoDate(state.weekStart);
  await persist('attendance:'+state.houseId+':'+weekSuffix, state.attendance);
  await recordAttendanceWeek(weekSuffix);
}
async function recordAttendanceWeek(weekSuffix){
  try{
    const key = 'attendance-weeks:'+state.houseId;
    const res = await safeGet(key);
    const weeks = res ? JSON.parse(res.value) : [];
    if(!weeks.includes(weekSuffix)){
      weeks.push(weekSuffix);
      await persist(key, weeks);
    }
  }catch(e){ console.error('week index error', e); }
}

async function exportHouseDataToExcel(){
  if(typeof XLSX === 'undefined'){
    showToast('Export tool failed to load — check your internet connection and try again.');
    return;
  }
  const h = getHouse(state.houseId);
  showToast('Preparing your download…');
  try{
    const wb = XLSX.utils.book_new();

    const studentsRows = state.students.map(s=>({
      'Name': s.name, 'Class': s.className||'', 'Admission No.': s.admNo||'',
      'Gender': s.gender||'', 'Date added': s.dateAdded||'',
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(studentsRows.length?studentsRows:[{'Name':'','Class':'','Admission No.':'','Gender':'','Date added':''}]), 'Students');

    const exeatRows = state.exeats.map(e=>{
      const s = state.students.find(st=>st.id===e.studentId);
      const st = computeExeatStatus(e);
      let statusLabel = 'Returned';
      if(st.status==='overdue') statusLabel = st.daysOverdue + ' day(s) overdue';
      else if(st.status==='out') statusLabel = st.daysLeft + ' day(s) left';
      else if(st.status==='due') statusLabel = 'Due today';
      else if(st.status==='late') statusLabel = 'Returned late';
      return {
        'Student': s ? s.name : 'Unknown', 'Class': s ? (s.className||'') : '',
        'Destination': e.destination||'', 'Contact': e.contact||'',
        'Date out': e.dateOut, 'Days': e.days, 'Expected return': e.expectedReturn,
        'Actual return': e.actualReturn||'', 'Status': statusLabel, 'Reason': e.reason||'',
      };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exeatRows.length?exeatRows:[{'Student':'','Class':'','Destination':'','Contact':'','Date out':'','Days':'','Expected return':'','Actual return':'','Status':'','Reason':''}]), 'Exeats');

    const teamRows = [];
    if(state.houseInfo.housemaster) teamRows.push({'Name': state.houseInfo.housemaster.name, 'Role': state.houseInfo.housemaster.portfolio});
    (state.houseInfo.staff||[]).forEach(st=>teamRows.push({'Name': st.name, 'Role': st.portfolio||'Staff'}));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(teamRows.length?teamRows:[{'Name':'','Role':''}]), 'House Team');

    let attendanceRows = [];
    try{
      const prefix = 'attendance:'+state.houseId+':';
      const weekSuffixSet = new Set();

      // Fast path: the explicit index kept up to date every time attendance is saved.
      try{
        const idxRes = await safeGet('attendance-weeks:'+state.houseId);
        if(idxRes) JSON.parse(idxRes.value).forEach(w=>weekSuffixSet.add(w));
      }catch(e){ console.error('week index read error', e); }

      // Reliable path: directly probe every Monday for the last two years. This does not depend
      // on storage.list() at all (its exact key-format behaviour can vary), so it works even if
      // the index above is missing or incomplete. Non-existent weeks are simply skipped.
      const cursor = new Date(state.weekStart);
      for(let i=0;i<104;i++){
        weekSuffixSet.add(isoDate(cursor));
        cursor.setDate(cursor.getDate()-7);
      }
      weekSuffixSet.add(isoDate(state.weekStart)); // always include the week currently open

      const weekSuffixes = [...weekSuffixSet].sort();
      const weekResults = await Promise.all(weekSuffixes.map(async weekSuffix=>{
        const res = await safeGet(prefix + weekSuffix);
        return { weekSuffix, res };
      }));

      weekResults.forEach(({weekSuffix, res})=>{
        if(!res) return;
        let weekData;
        try{ weekData = JSON.parse(res.value); }catch(e){ return; }
        state.students.forEach(s=>{
          const rec = weekData[s.id] || {};
          const presentCount = DAY_NAMES.filter(d=>rec[d]).length;
          attendanceRows.push({
            'Week starting': weekSuffix, 'Student': s.name, 'Class': s.className||'',
            'Mon': rec.Mon?'Present':'', 'Tue': rec.Tue?'Present':'', 'Wed': rec.Wed?'Present':'',
            'Thu': rec.Thu?'Present':'', 'Fri': rec.Fri?'Present':'', 'Sat': rec.Sat?'Present':'', 'Sun': rec.Sun?'Present':'',
            'Days present': presentCount, 'Week %': Math.round((presentCount/7)*100) + '%',
          });
        });
      });
      attendanceRows.sort((a,b)=> a['Week starting'] < b['Week starting'] ? -1 : 1);
    }catch(e){ console.error('attendance export error', e); }
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(attendanceRows.length?attendanceRows:[{'Week starting':'','Student':'','Class':'','Mon':'','Tue':'','Wed':'','Thu':'','Fri':'','Sat':'','Sun':'','Days present':'','Week %':''}]), 'Attendance');

    const filename = `ANLOSHS-${h.name.replace(/\s+/g,'-')}-backup-${todayISO()}.xlsx`;
    XLSX.writeFile(wb, filename);
    showToast('Download started — check your downloads folder.');
  }catch(e){
    console.error(e);
    showToast('Export failed — please try again.');
  }
}

async function submitAuthSetup(e){
  e.preventDefault();
  const f = e.target;
  const name = f.hmName.value.trim();
  const portfolio = f.hmPortfolio.value;
  const pin = f.pin.value.trim();
  const pinConfirm = f.pinConfirm.value.trim();
  if(!name){ state.authError='Enter your full name.'; render(); return; }
  if(!isValidPin(pin)){ state.authError='PIN must be 4–6 digits.'; render(); return; }
  if(pin!==pinConfirm){ state.authError='PINs do not match.'; render(); return; }
  state.houseInfo.housemaster = { name, portfolio, pinHash: hashPin(pin, state.houseId) };
  state.authError='';
  await saveHouseInfo();
  state.screen='workspace';
  render();
  showToast('House lead account created.');
}
function submitAuthLogin(e){
  e.preventDefault();
  const f = e.target;
  const enteredName = f.hmNameConfirm.value.trim();
  const pin = f.pin.value.trim();
  const hm = state.houseInfo.housemaster;
  const nameMatches = enteredName.toLowerCase() === hm.name.trim().toLowerCase();
  const pinMatches = hashPin(pin, state.houseId) === hm.pinHash;
  if(nameMatches && pinMatches){
    state.authError=''; state.pinInput='';
    state.screen='workspace';
    render();
  } else {
    state.authError = 'Name or PIN doesn\u2019t match our records for this house.';
    state.pinInput='';
    render();
  }
}

async function submitExeat(e){
  e.preventDefault();
  const f = e.target;
  const studentId = f.studentId.value;
  const dateOut = f.dateOut.value;
  const days = parseInt(f.days.value,10);
  if(!studentId){ showToast('Select a student.'); return; }
  if(!dateOut || !days || days<1){ showToast('Enter a valid date and number of days.'); return; }
  const expectedReturn = isoDate(new Date(parseISO(dateOut).getTime() + days*86400000));
  const exeat = {
    id: uuid(), studentId, dateOut, days, expectedReturn,
    destination: f.destination.value.trim(),
    contact: f.contact.value.trim(),
    reason: f.reason.value.trim(), actualReturn: null,
  };
  state.exeats.unshift(exeat);
  closeModal(); render();
  await saveExeats();
  showToast('Exeat recorded.');
}

function renderTab(h, flags){
  if(state.tab==='dashboard') return renderDashboard(h, flags);
  if(state.tab==='students') return renderStudents(h);

  if(state.tab==='exeat') return renderExeat(h);
  if(state.tab==='team') return renderTeam(h);
  return '';
}

function renderDashboard(h, flags){
  const total = state.students.length;
  const outNow = state.exeats.filter(e=>!e.actualReturn).length;
  const weekDates = getWeekDates(state.weekStart);
  const todayIdx = weekDates.findIndex(d=>isoDate(d)===todayISO());
  const daysElapsed = todayIdx>=0 ? todayIdx+1 : 7;
  let checked=0, possible=0;
  state.students.forEach(s=>{
    for(let i=0;i<daysElapsed;i++){ possible++; if(state.attendance[s.id] && state.attendance[s.id][DAY_NAMES[i]]) checked++; }
  });
  const attPct = possible>0 ? Math.round((checked/possible)*100) : 0;

  return `
  <div class="page-header">
    <div>
      <h1>Dashboard</h1>
      <div class="sub">${h.name} &middot; ${state.houseInfo.housemaster ? state.houseInfo.housemaster.portfolio+' '+state.houseInfo.housemaster.name : 'No house lead assigned yet'}</div>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-card"><div class="num">${total}</div><div class="label">Students in house</div></div>
    <div class="stat-card"><div class="num">${outNow}</div><div class="label">Currently on exeat</div></div>
    <div class="stat-card"><div class="num">${attPct}%</div><div class="label">Attendance this week</div></div>
    <div class="stat-card flag"><div class="num">${flags.length}</div><div class="label">Flagged — overdue return</div></div>
  </div>

  ${flags.length>0 ? `
  <div class="alert-banner">
    <h3>⚠ Exeat Watch — students who have not reported back</h3>
    ${flags.map(f=>{
      const s = state.students.find(st=>st.id===f.studentId);
      return `<div class="flag-row">
        ${photoOrInitials(s, 'thumb')}
        <div class="name">${s?s.name:'Unknown student'} ${s&&s.className?`<span class="mono" style="font-weight:400;color:var(--ink-soft);font-size:11.5px;">&middot; ${s.className}</span>`:''}
          <div style="font-weight:400;font-size:11.5px;color:var(--ink-soft);margin-top:2px;">
            ${f.destination ? `Gone to: ${f.destination} &middot; ` : ''}expected back ${fmtDateFull(f.expectedReturn)}
          </div>
        </div>
        <div class="days">${f._status.daysOverdue} day${f._status.daysOverdue===1?'':'s'} overdue</div>
        ${callButtonHtml(f.contact, 'Call now')}
      </div>`;
    }).join('')}
  </div>` : `
  <div class="panel" style="background:var(--accent-tint);border-color:transparent;">
    <div style="font-size:13.5px;color:var(--accent-dark);">✓ No overdue exeats right now — every student is accounted for.</div>
  </div>`}

  <div class="panel">
    <h3>House lead</h3>
    ${state.houseInfo.housemaster ? `
      <div class="staff-list-item">
        <div class="avatar">${initials(state.houseInfo.housemaster.name)}</div>
        <div class="who"><div class="n">${state.houseInfo.housemaster.name}</div><div class="p">${state.houseInfo.housemaster.portfolio}</div></div>
      </div>` : `<div class="empty-state">No housemaster/mistress on record yet. Add one from the House Team tab.</div>`}
  </div>
  `;
}

function photoOrInitials(student, cls){
  if(!student) return `<div class="photo-thumb ${cls} placeholder">?</div>`;
  if(student.photo) return `<img class="photo-thumb ${cls}" src="${student.photo}" alt="${student.name}">`;
  return `<div class="photo-thumb ${cls} placeholder">${initials(student.name)}</div>`;
}

  const q = state.studentSearch.trim().toLowerCase();

function getWeekDates(weekStart){
  const dates=[];
  for(let i=0;i<7;i++){ const d = new Date(weekStart); d.setDate(weekStart.getDate()+i); dates.push(d); }
  return dates;
}

function renderAttendance(h){
  const weekDates = getWeekDates(state.weekStart);
  const weekLabel = `${fmtDateShort(weekDates[0])} – ${fmtDateShort(weekDates[6])}, ${weekDates[6].getFullYear()}`;
  return `
  <div class="page-header">
    <div><h1>Attendance</h1><div class="sub">Weekly roll call for ${h.name}</div></div>
    <div class="week-nav">
      <button class="icon-btn" onclick="changeWeek(-1)">&larr; Prev</button>
      <div class="lbl">${weekLabel}</div>
      <button class="icon-btn" onclick="changeWeek(1)">Next &rarr;</button>
    </div>
  </div>
  <div class="panel" style="padding:0;">
    ${state.students.length===0 ? `<div class="empty-state">Add students first to begin taking attendance.</div>` : `
    <table class="att-table">
      <thead><tr>
        <th>Student</th>
        ${weekDates.map((d,i)=>`<th class="day">${DAY_NAMES[i]}<br><span style="font-weight:400;">${d.getDate()}</span></th>`).join('')}
        <th class="day">Week %</th>
      </tr></thead>
      <tbody>
      ${state.students.map(s=>{
        const rec = state.attendance[s.id] || {};
        const present = DAY_NAMES.filter(d=>rec[d]).length;
        const pct = Math.round((present/7)*100);
        return `<tr>
          <td>${s.name} <span class="mono" style="color:var(--ink-soft);font-size:11px;">${s.className||''}</span></td>
          ${DAY_NAMES.map(d=>`<td class="day"><input type="checkbox" class="att-check" ${rec[d]?'checked':''} onchange="toggleAttendance('${s.id}','${d}')"></td>`).join('')}
          <td class="day"><span class="pct-pill">${pct}%</span></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`}
  </div>
  `;
}

function renderExeat(h){
  const rows = state.exeats.map(e=>({...e, _status: computeExeatStatus(e)}));
  return `
  <div class="page-header">
    <div><h1>Exeat &amp; Movement</h1><div class="sub">Track students who have gone home and when they are due back</div></div>
    <button class="btn" onclick="openModal('exeat')" ${state.students.length===0?'disabled title="Add students first"':''}>+ Record exeat</button>
  </div>
  <div class="panel" style="padding:0;">
    ${rows.length===0 ? `<div class="empty-state">No exeat records yet.</div>` : `
    <table>
      <thead><tr><th>Student</th><th>Destination</th><th>Date out</th><th>Days</th><th>Expected back</th><th>Status</th><th></th><th></th></tr></thead>
      <tbody>
      ${rows.map(e=>{
        const s = state.students.find(st=>st.id===e.studentId);
        const st = e._status;
        let badge = '';
        if(st.status==='overdue') badge = `<span class="badge overdue">${st.daysOverdue}d overdue</span>`;
        else if(st.status==='due') badge = `<span class="badge due">Due today</span>`;
        else if(st.status==='out') badge = `<span class="badge out">Out &middot; ${st.daysLeft}d left</span>`;
        else if(st.status==='late') badge = `<span class="badge late">Returned late</span>`;
        else badge = `<span class="badge returned">Returned ${fmtDateFull(e.actualReturn)}</span>`;
        return `<tr class="${st.status==='overdue'?'flagged':''}">
          <td>${s?s.name:'Unknown'}</td>
          <td>${e.destination || '<span class="mono" style="color:var(--ink-soft);">&mdash;</span>'}</td>
          <td class="mono">${fmtDateFull(e.dateOut)}</td>
          <td class="mono">${e.days}</td>
          <td class="mono">${fmtDateFull(e.expectedReturn)}</td>
          <td>${badge}</td>
          <td>${st.status==='overdue' ? callButtonHtml(e.contact) : ''}</td>
          <td class="row-actions">
            ${!e.actualReturn ? `<button class="icon-btn" onclick="markReturned('${e.id}')">Mark returned</button>` : ''}
            <button class="icon-btn" onclick="deleteExeat('${e.id}')">Delete</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`}
  </div>
  `;
}
